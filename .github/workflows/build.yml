name: Build FrontVCam

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install roothide Theos
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in 1 2 3; do
            bash -c "$(curl -fsSL https://raw.githubusercontent.com/roothide/theos/master/bin/install-theos)" && break
            if [ "$i" = "3" ]; then
              exit 1
            fi
            sleep 20
          done

      - name: Build package
        run: |
          export THEOS="$HOME/theos"
          make clean package THEOS_PACKAGE_SCHEME=roothide

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: frontvcam-deb
          path: packages/*.deb
